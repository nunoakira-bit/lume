<meta name="supported-color-schemes" content="light" />
<title>Em construção · Lume Saúde Digital</title>

<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700;12..96,800&family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    color-scheme:light only;
    --cyan:#15b8cf;--blue:#2350d6;--navy:#0e1f4d;--ink:#0d1a3a;--muted:#5a6a8c;--muted-2:#8a96b3;
    --line:#e7ecf6;--soft:#f3f7fd;
    --grad:linear-gradient(100deg,var(--cyan),var(--blue));
    --shadow:0 30px 70px -25px rgba(14,31,77,.28);
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{color-scheme:light only;background:#fff}
  body{min-height:100vh;background:radial-gradient(120% 90% at 50% 0%,#eef4fc,#ffffff 60%);
    color:var(--ink);font-family:'Plus Jakarta Sans',system-ui,sans-serif;
    display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
    padding:32px 22px;overflow:hidden;position:relative}
  body::before{content:"";position:absolute;top:-200px;right:-140px;width:640px;height:640px;border-radius:50%;
    background:radial-gradient(circle,rgba(21,184,207,.16),transparent 62%);pointer-events:none}
  body::after{content:"";position:absolute;bottom:-220px;left:-160px;width:580px;height:580px;border-radius:50%;
    background:radial-gradient(circle,rgba(35,80,214,.12),transparent 62%);pointer-events:none}
  .card{position:relative;z-index:2;max-width:560px;width:100%;
    background:rgba(255,255,255,.82);backdrop-filter:blur(16px);
    border:1px solid var(--line);border-radius:32px;box-shadow:var(--shadow);padding:54px 40px}
  .logo{height:56px;width:auto;margin:0 auto 30px;display:block}
  .gear-wrap{width:96px;height:96px;margin:0 auto 28px;position:relative;display:grid;place-items:center}
  .gear-wrap .ring{position:absolute;inset:0;border-radius:50%;background:var(--grad);opacity:.12}
  .gear-wrap svg{width:48px;height:48px;stroke:var(--blue);fill:none;stroke-width:1.7}
  .gear-wrap .g1{animation:spin 8s linear infinite;transform-origin:center}
  .badge{display:inline-flex;align-items:center;gap:9px;font-size:12.5px;font-weight:700;letter-spacing:1.4px;
    text-transform:uppercase;color:var(--blue);background:linear-gradient(120deg,rgba(21,184,207,.12),rgba(35,80,214,.12));
    padding:9px 16px;border-radius:30px;margin-bottom:22px}
  .badge .d{width:7px;height:7px;border-radius:50%;background:var(--cyan);box-shadow:0 0 0 4px rgba(21,184,207,.18);animation:pulse 2s infinite}
  h1{font-family:'Bricolage Grotesque';font-size:clamp(28px,6vw,42px);font-weight:700;color:var(--navy);line-height:1.06;letter-spacing:-.02em}
  h1 em{font-style:normal;background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
  p{color:var(--muted);font-size:16.5px;margin:18px auto 8px;max-width:42ch;line-height:1.65}
  .bar{height:8px;border-radius:6px;background:#e7eefb;overflow:hidden;margin:30px auto 34px;max-width:300px}
  .bar i{display:block;height:100%;width:42%;border-radius:6px;background:var(--grad);animation:load 2.6s ease-in-out infinite}
  .btn{font-family:inherit;font-weight:600;font-size:15.5px;color:#fff;background:var(--grad);text-decoration:none;
    display:inline-flex;align-items:center;gap:9px;padding:15px 28px;border-radius:40px;
    box-shadow:0 14px 30px -10px rgba(35,80,214,.55);transition:transform .3s,box-shadow .3s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 20px 42px -10px rgba(35,80,214,.6)}
  .btn .arr{transition:transform .3s}.btn:hover .arr{transform:translateX(-4px)}
  .foot{position:relative;z-index:2;margin-top:26px;color:var(--muted-2);font-size:12.5px;letter-spacing:.5px}
  @keyframes spin{to{transform:rotate(360deg)}}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
  @keyframes load{0%{width:18%;margin-left:0}50%{width:60%}100%{width:18%;margin-left:82%}}
  @media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}.bar i{width:45%}}
</style>
</head>
